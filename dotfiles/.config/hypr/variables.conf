source = ./colors.conf

general {
	border_size = 2
	gaps_in = 3
	gaps_out = 6

	# border_size = 0
	# gaps_in = 0
	# gaps_out = 0

	col.active_border = $primary
	col.inactive_border = $inverse_primary
}

decoration {
	rounding = 6
	active_opacity = 0.80
	inactive_opacity = 0.80

	# rounding = 0
	# active_opacity = 1
	# inactive_opacity = 1

	blur {
		enabled = true
		passes = 2
	}

	shadow {
		enabled = true
		color = $primary_container
		color_inactive = $secondary_container
	}
}

input {
	touchpad {
		natural_scroll = true
	}
}

dwindle {
	pseudotile = true
	preserve_split = true
}

master {
	new_status = master
}

gestures {
	workspace_swipe = true
}

device {
	name = usb-optical-mouse-
	sensitivity = 0.1
}
